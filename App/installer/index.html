<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB_insight Setup</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070d1f;color:#dfe4fe;font-family:'Segoe UI',sans-serif;height:100vh;
  display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* 타이틀바 */
.titlebar{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 0;-webkit-app-region:drag;flex-shrink:0}
.titlebar-left{display:flex;align-items:center;gap:8px}
.logo-icon{width:26px;height:26px;border-radius:6px;
  background:linear-gradient(135deg,#85adff,#ac8aff);
  display:flex;align-items:center;justify-content:center;font-size:13px}
.titlebar-title{font-size:12px;font-weight:700;color:#85adff;letter-spacing:.05em}
.close-btn{-webkit-app-region:no-drag;width:28px;height:28px;border-radius:8px;border:none;
  background:rgba(255,255,255,.06);color:#a5aac2;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:background .15s}
.close-btn:hover{background:rgba(239,68,68,.25);color:#f87171}

/* 헤더 */
.header{padding:28px 32px 20px;flex-shrink:0}
.header h1{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}
.header p{font-size:12px;color:#6b7194}

/* 단계 목록 */
.steps{flex:1;padding:0 32px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.step{display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:14px 16px;transition:border-color .2s}
.step.active{border-color:rgba(133,173,255,.3);background:rgba(133,173,255,.06)}
.step.done{border-color:rgba(52,211,153,.25);background:rgba(52,211,153,.04)}
.step.error{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.04)}
.step.skipped{border-color:rgba(107,114,148,.2)}

.step-icon{width:38px;height:38px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  background:rgba(255,255,255,.05);transition:background .2s}
.step.active .step-icon{background:rgba(133,173,255,.15)}
.step.done   .step-icon{background:rgba(52,211,153,.12)}
.step.error  .step-icon{background:rgba(239,68,68,.12)}

.step-info{flex:1;min-width:0}
.step-name{font-size:13px;font-weight:700;color:#dfe4fe;margin-bottom:2px}
.step-desc{font-size:11px;color:#6b7194;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step.active .step-desc{color:#8499c4}

.step-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0}
.badge-pending{background:rgba(255,255,255,.06);color:#6b7194}
.badge-running{background:rgba(133,173,255,.15);color:#85adff;animation:pulse 1.2s infinite}
.badge-done{background:rgba(52,211,153,.15);color:#34d399}
.badge-skip{background:rgba(107,114,148,.1);color:#6b7194}
.badge-error{background:rgba(239,68,68,.15);color:#f87171}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

/* 하단 버튼 */
.footer{padding:20px 32px 24px;flex-shrink:0}
.btn-install{width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#85adff,#ac8aff);color:#070d1f;
  font-size:14px;font-weight:900;letter-spacing:.02em;
  transition:filter .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-install:hover:not(:disabled){filter:brightness(1.1)}
.btn-install:active:not(:disabled){transform:scale(.98)}
.btn-install:disabled{opacity:.5;cursor:not-allowed}
.btn-launch{width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;
  background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);
  color:#34d399;font-size:14px;font-weight:900;
  transition:filter .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-launch:hover{filter:brightness(1.1)}
</style>
</head>
<body>

<!-- 타이틀바 -->
<div class="titlebar">
  <div class="titlebar-left">
    <div class="logo-icon">⬡</div>
    <span class="titlebar-title">DB_insight Setup v0.1.0</span>
  </div>
  <button class="close-btn" onclick="window.api.windowClose()">✕</button>
</div>

<!-- 헤더 -->
<div class="header">
  <h1>설치 프로그램</h1>
  <p>아래 구성요소를 확인하고 설치합니다. 이미 설치된 항목은 건너뜁니다.</p>
</div>

<!-- 단계 -->
<div class="steps">
  <div class="step" id="step-lo">
    <div class="step-icon">📄</div>
    <div class="step-info">
      <div class="step-name">LibreOffice</div>
      <div class="step-desc" id="desc-lo">문서(.docx · .hwp · .pptx · .xlsx) 변환 엔진</div>
    </div>
    <span class="step-badge badge-pending" id="badge-lo">대기</span>
  </div>

  <div class="step" id="step-req">
    <div class="step-icon">🐍</div>
    <div class="step-info">
      <div class="step-name">Python 패키지</div>
      <div class="step-desc" id="desc-req">requirements.txt 의존성 설치</div>
    </div>
    <span class="step-badge badge-pending" id="badge-req">대기</span>
  </div>

  <div class="step" id="step-sc">
    <div class="step-icon">🔗</div>
    <div class="step-info">
      <div class="step-name">바로가기 생성</div>
      <div class="step-desc" id="desc-sc">바탕화면 + 시작 메뉴에 DB_insight 추가</div>
    </div>
    <span class="step-badge badge-pending" id="badge-sc">대기</span>
  </div>
</div>

<!-- 푸터 -->
<div class="footer">
  <button class="btn-install" id="btn-main" onclick="runInstall()">
    <span>🚀</span> 설치 시작
  </button>
</div>

<script>
let status = {}

// 단계 상태 업데이트
function setStep(id, state, desc) {
  const el  = document.getElementById('step-' + id)
  const bdg = document.getElementById('badge-' + id)
  const dsc = document.getElementById('desc-'  + id)
  el.className = 'step ' + state
  const labels = { pending:'대기', running:'진행 중', done:'완료', skip:'건너뜀', error:'오류' }
  bdg.textContent = labels[state] || state
  bdg.className   = 'step-badge badge-' + (state === 'skip' ? 'skip' : state === 'done' ? 'done' : state === 'error' ? 'error' : state === 'running' ? 'running' : 'pending')
  if (desc) dsc.textContent = desc
}

function setBtn(text, disabled) {
  const btn = document.getElementById('btn-main')
  btn.innerHTML = text
  btn.disabled  = disabled
}

// 초기 상태 확인
async function init() {
  setBtn('<span>⏳</span> 확인 중...', true)
  try {
    status = await window.api.checkStatus()
    if (status.libreoffice) setStep('lo',  'done', '이미 설치되어 있습니다')
    if (!status.msiExists && !status.libreoffice)
      setStep('lo', 'error', 'MSI 파일 없음: C:\\Honey\\DB_insight\\LibreOffice_26.2.2_Win_x86-64.msi')
    if (!status.python)
      setStep('req', 'error', 'Python을 찾을 수 없습니다')
    if (!status.mainApp)
      setStep('sc', 'error', '앱 실행 파일 없음')
  } catch(e) {
    console.error(e)
  }
  setBtn('<span>🚀</span> 설치 시작', false)
}

async function runInstall() {
  setBtn('<span>⏳</span> 설치 중...', true)

  // 1) LibreOffice
  if (!status.libreoffice) {
    if (!status.msiExists) {
      setStep('lo', 'error', 'MSI 파일을 찾을 수 없습니다')
    } else {
      setStep('lo', 'running', 'UAC 권한 허용 후 설치 진행 중...')
      const r = await window.api.installLibreOffice()
      if (r.success && !r.skipped) setStep('lo', 'done', '설치 완료')
      else if (r.skipped)          setStep('lo', 'skip', '이미 설치되어 있습니다')
      else                         setStep('lo', 'error', r.error || '코드 ' + r.code)
    }
  } else {
    setStep('lo', 'skip', '이미 설치되어 있습니다')
  }

  // 2) Python 패키지
  if (status.python) {
    setStep('req', 'running', 'pip install 실행 중...')
    const r = await window.api.installRequirements()
    if (r.success) setStep('req', 'done', '설치 완료')
    else           setStep('req', 'error', r.error || '코드 ' + r.code)
  } else {
    setStep('req', 'skip', 'Python 없음 — 건너뜀')
  }

  // 3) 바로가기
  if (status.mainApp) {
    setStep('sc', 'running', '바로가기 생성 중...')
    const r = await window.api.createShortcut()
    if (r.success) setStep('sc', 'done', '바탕화면 + 시작 메뉴 생성 완료')
    else           setStep('sc', 'error', r.error || '생성 실패')
  } else {
    setStep('sc', 'skip', '앱 없음 — 건너뜀')
  }

  // 완료 → 앱 실행 버튼
  const btn = document.getElementById('btn-main')
  btn.className = 'btn-launch'
  btn.disabled  = false
  btn.innerHTML = '<span>✅</span> 설치 완료 — DB_insight 실행'
  btn.onclick   = () => window.api.launchApp()
}

init()
</script>
</body>
</html>
